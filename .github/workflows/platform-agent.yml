name: Platform Agent

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: platform-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:

################################################################################
# ANALYZE REPOSITORY
################################################################################

  analyze-repository:

    runs-on: ubuntu-latest

    outputs:
      app_path: ${{ steps.detect.outputs.app_path }}
      language: ${{ steps.detect.outputs.language }}
      build_tool: ${{ steps.detect.outputs.build_tool }}
      framework: ${{ steps.detect.outputs.framework }}
      java_version: ${{ steps.detect.outputs.java_version }}
      deployment_target: ${{ steps.detect.outputs.deployment_target }}

      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
      has_terraform: ${{ steps.detect.outputs.has_terraform }}
      has_workflows: ${{ steps.detect.outputs.has_workflows }}

    steps:

      - uses: actions/checkout@v4

      - name: Analyze Application
        id: detect
        shell: bash
        run: |

          APP_PATH=$(find . -type f -name "pom.xml" | head -1 | xargs dirname)

          if [ -z "$APP_PATH" ]; then
            echo "No pom.xml found"
            exit 1
          fi

          echo "Application found at: $APP_PATH"

          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

          echo "language=java" >> $GITHUB_OUTPUT
          echo "build_tool=maven" >> $GITHUB_OUTPUT

          JAVA_VERSION=$(sed -n 's:.*<java.version>\(.*\)</java.version>.*:\1:p' "$APP_PATH/pom.xml" | head -1)

          if [ -z "$JAVA_VERSION" ]; then
            JAVA_VERSION=17
          fi

          echo "java_version=$JAVA_VERSION" >> $GITHUB_OUTPUT

          if grep -q "spring-boot" "$APP_PATH/pom.xml"; then
            FRAMEWORK=springboot
          else
            FRAMEWORK=java
          fi

          echo "framework=$FRAMEWORK" >> $GITHUB_OUTPUT

          echo "deployment_target=cloudrun" >> $GITHUB_OUTPUT

          [ -f "$APP_PATH/Dockerfile" ] \
            && echo "has_dockerfile=true" >> $GITHUB_OUTPUT \
            || echo "has_dockerfile=false" >> $GITHUB_OUTPUT

          [ -d "$APP_PATH/terraform" ] \
            && echo "has_terraform=true" >> $GITHUB_OUTPUT \
            || echo "has_terraform=false" >> $GITHUB_OUTPUT

          [ -d "$APP_PATH/.github/workflows" ] \
            && echo "has_workflows=true" >> $GITHUB_OUTPUT \
            || echo "has_workflows=false" >> $GITHUB_OUTPUT

################################################################################
# LOAD AGENTS
################################################################################

  load-agents:

    runs-on: ubuntu-latest

    needs:
      - analyze-repository

    outputs:
      docker_agent: ${{ steps.load.outputs.docker_agent }}
      terraform_agent: ${{ steps.load.outputs.terraform_agent }}
      cicd_agent: ${{ steps.load.outputs.cicd_agent }}

    steps:

      - uses: actions/checkout@v4

      - id: load
        run: |

          echo "docker_agent=.github/agents/docker-agent.agent.md" >> $GITHUB_OUTPUT
          echo "terraform_agent=.github/agents/terraform-agent.agent.md" >> $GITHUB_OUTPUT
          echo "cicd_agent=.github/agents/cicd-agent.agent.md" >> $GITHUB_OUTPUT

      - name: Show Loaded Agents
        run: |

          echo "===== DOCKER AGENT ====="
          cat .github/agents/docker-agent.agent.md

          echo ""
          echo "===== TERRAFORM AGENT ====="
          cat .github/agents/terraform-agent.agent.md

          echo ""
          echo "===== CICD AGENT ====="
          cat .github/agents/cicd-agent.agent.md

################################################################################
# AGENT DECISION ENGINE
################################################################################

  agent-decision-engine:

    runs-on: ubuntu-latest

    needs:
      - analyze-repository
      - load-agents

    outputs:
      docker_template: ${{ steps.decision.outputs.docker_template }}
      terraform_template: ${{ steps.decision.outputs.terraform_template }}
      cicd_template: ${{ steps.decision.outputs.cicd_template }}

    steps:

      - uses: actions/checkout@v4

      - name: Agent Decisions
        id: decision
        run: |

          if [ "${{ needs.analyze-repository.outputs.language }}" = "java" ]; then
            echo "docker_template=platform-templates/docker/java" >> $GITHUB_OUTPUT
          fi

          if [ "${{ needs.analyze-repository.outputs.deployment_target }}" = "cloudrun" ]; then
            echo "terraform_template=platform-templates/terraform/gcp-cloudrun" >> $GITHUB_OUTPUT
          fi

          if [ "${{ needs.analyze-repository.outputs.build_tool }}" = "maven" ]; then
            echo "cicd_template=platform-templates/github-actions/java-maven-cloudrun" >> $GITHUB_OUTPUT
          fi

################################################################################
# GENERATE ASSETS
################################################################################

  generate-assets:

    runs-on: ubuntu-latest

    needs:
      - analyze-repository
      - agent-decision-engine

    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}

    steps:

      - uses: actions/checkout@v4

      - name: Set Application Path
        run: |
          echo "APP_PATH=${{ needs.analyze-repository.outputs.app_path }}" >> $GITHUB_ENV

      - name: Generate Docker Assets
        if: needs.analyze-repository.outputs.has_dockerfile == 'false'
        run: |

          cp \
          "${{ needs.agent-decision-engine.outputs.docker_template }}/Dockerfile" \
          "$APP_PATH/Dockerfile"

          cp \
          "${{ needs.agent-decision-engine.outputs.docker_template }}/.dockerignore" \
          "$APP_PATH/.dockerignore"

      - name: Generate Terraform Assets
        if: needs.analyze-repository.outputs.has_terraform == 'false'
        run: |

          mkdir -p "$APP_PATH/terraform"

          cp -R \
          "${{ needs.agent-decision-engine.outputs.terraform_template }}"/* \
          "$APP_PATH/terraform/"

      - name: Generate CI/CD Assets
        if: needs.analyze-repository.outputs.has_workflows == 'false'
        run: |

          mkdir -p "$APP_PATH/.github/workflows"

          cp \
          "${{ needs.agent-decision-engine.outputs.cicd_template }}/ci-cd.yml" \
          "$APP_PATH/.github/workflows/ci-cd.yml"

          cp \
          platform-templates/security/trivy/trivy.yml \
          "$APP_PATH/.github/workflows/trivy.yml"

          cp \
          platform-templates/security/gitleaks/gitleaks.yml \
          "$APP_PATH/.github/workflows/gitleaks.yml"

      - name: Configure Git
        run: |

          git config user.name "platform-agent"
          git config user.email "platform-agent@users.noreply.github.com"

      - name: Create Branch
        id: branch
        run: |

          BRANCH_NAME=platform-agent-${{ github.run_number }}

          git checkout -b $BRANCH_NAME

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Commit Changes
        run: |

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Platform Agent generated DevOps assets"

      - name: Push Branch
        run: |

          git push origin HEAD

################################################################################
# CREATE PR
################################################################################

  create-pr:

    runs-on: ubuntu-latest

    needs:
      - generate-assets

    steps:

      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          title: Platform Agent Generated DevOps Assets

          branch: platform-agent-${{ github.run_number }}

          base: main

          body: |

            ## Platform Agent

            Generated Assets:

            - Dockerfile
            - Terraform
            - CI/CD Workflow
            - Trivy
            - Gitleaks

            Please review.

################################################################################
# PLATFORM REVIEW
################################################################################

  platform-review:

    runs-on: ubuntu-latest

    needs:
      - analyze-repository
      - load-agents
      - agent-decision-engine
      - generate-assets
      - create-pr

    steps:

      - name: Platform Review
        run: |

          cat << EOF >> $GITHUB_STEP_SUMMARY

          # Platform Agent Review

          ## Application

          Language:
          - ${{ needs.analyze-repository.outputs.language }}

          Framework:
          - ${{ needs.analyze-repository.outputs.framework }}

          Java Version:
          - ${{ needs.analyze-repository.outputs.java_version }}

          Build Tool:
          - ${{ needs.analyze-repository.outputs.build_tool }}

          Deployment Target:
          - ${{ needs.analyze-repository.outputs.deployment_target }}

          ## Selected Templates

          Docker:
          - ${{ needs.agent-decision-engine.outputs.docker_template }}

          Terraform:
          - ${{ needs.agent-decision-engine.outputs.terraform_template }}

          CI/CD:
          - ${{ needs.agent-decision-engine.outputs.cicd_template }}

          ## Generated Assets

          - Dockerfile
          - Terraform
          - GitHub Actions
          - Trivy
          - Gitleaks

          ## Recommendations

          - Enable CodeQL
          - Enable Dependabot
          - Enable SBOM
          - Enable Container Signing

          EOF