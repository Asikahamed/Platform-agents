name: Platform Agent

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  analyze-repository:

    runs-on: ubuntu-latest

    outputs:
      app_path: ${{ steps.detect.outputs.app_path }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
      has_terraform: ${{ steps.detect.outputs.has_terraform }}
      has_workflows: ${{ steps.detect.outputs.has_workflows }}

    steps:

      - uses: actions/checkout@v4

      - name: Detect Java Application
        id: detect
        run: |

          APP_PATH=$(find . -name pom.xml | head -1 | xargs dirname)

          if [ -z "$APP_PATH" ]; then
            echo "No pom.xml found"
            exit 1
          fi

          echo "Java application found at: $APP_PATH"

          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

          if [ -f "$APP_PATH/Dockerfile" ]; then
            echo "has_dockerfile=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfile=false" >> $GITHUB_OUTPUT
          fi

          if [ -d "$APP_PATH/terraform" ]; then
            echo "has_terraform=true" >> $GITHUB_OUTPUT
          else
            echo "has_terraform=false" >> $GITHUB_OUTPUT
          fi

          if [ -d "$APP_PATH/.github/workflows" ]; then
            echo "has_workflows=true" >> $GITHUB_OUTPUT
          else
            echo "has_workflows=false" >> $GITHUB_OUTPUT
          fi

      - name: Repository Analysis
        run: |
          echo "Application Path: ${{ steps.detect.outputs.app_path }}"
          echo "Dockerfile: ${{ steps.detect.outputs.has_dockerfile }}"
          echo "Terraform: ${{ steps.detect.outputs.has_terraform }}"
          echo "Workflows: ${{ steps.detect.outputs.has_workflows }}"

  generate-assets:

    runs-on: ubuntu-latest

    needs:
      - analyze-repository

    steps:

      - uses: actions/checkout@v4

      - name: Set Application Path
        run: |
          echo "APP_PATH=${{ needs.analyze-repository.outputs.app_path }}" >> $GITHUB_ENV

      - name: Generate Docker Assets
        if: needs.analyze-repository.outputs.has_dockerfile == 'false'
        run: |

          cp platform-templates/docker/java/Dockerfile \
            "$APP_PATH/Dockerfile"

          cp platform-templates/docker/java/.dockerignore \
            "$APP_PATH/.dockerignore"

      - name: Generate Terraform Assets
        if: needs.analyze-repository.outputs.has_terraform == 'false'
        run: |

          mkdir -p "$APP_PATH/terraform"

          cp -R \
            platform-templates/terraform/gcp-cloudrun/* \
            "$APP_PATH/terraform/"

      - name: Generate CI/CD Assets
        if: needs.analyze-repository.outputs.has_workflows == 'false'
        run: |

          mkdir -p "$APP_PATH/.github/workflows"

          cp \
            platform-templates/github-actions/java-maven-cloudrun/ci-cd.yml \
            "$APP_PATH/.github/workflows/ci-cd.yml"

          cp \
            platform-templates/security/trivy/trivy.yml \
            "$APP_PATH/.github/workflows/trivy.yml"

          cp \
            platform-templates/security/gitleaks/gitleaks.yml \
            "$APP_PATH/.github/workflows/gitleaks.yml"

      - name: Show Generated Files
        run: |
          echo "===== GENERATED FILES ====="
          find "$APP_PATH" | sort

      - name: Git Status Debug
        run: |

          echo "===== GIT STATUS ====="
          git status

          echo "===== CHANGED FILES ====="
          git diff --name-only

      - name: Configure Git
        run: |

          git config user.name "platform-agent"
          git config user.email "platform-agent@users.noreply.github.com"

      - name: Commit Generated Assets
        run: |

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Platform Agent generated DevOps assets"

      - name: Push Changes
        run: |
          git push origin HEAD:main

      - name: Platform Agent Report
        run: |

          echo "# Platform Agent Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Application" >> $GITHUB_STEP_SUMMARY
          echo "- Path: $APP_PATH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$APP_PATH/Dockerfile" ]; then
            echo "✅ Dockerfile Present" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$APP_PATH/terraform/main.tf" ]; then
            echo "✅ Terraform Present" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$APP_PATH/.github/workflows/ci-cd.yml" ]; then
            echo "✅ CI/CD Workflow Present" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$APP_PATH/.github/workflows/trivy.yml" ]; then
            echo "✅ Trivy Workflow Present" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$APP_PATH/.github/workflows/gitleaks.yml" ]; then
            echo "✅ Gitleaks Workflow Present" >> $GITHUB_STEP_SUMMARY
          fi