name: Platform Agent

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  platform-agent:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #######################################################################
      # ANALYZE REPOSITORY
      #######################################################################

      - name: Analyze Application
        id: detect
        shell: bash
        run: |

          APP_PATH=$(find . -type f -name "pom.xml" | head -1 | xargs dirname)

          if [ -z "$APP_PATH" ]; then
            echo "No pom.xml found"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

          echo "Application found at $APP_PATH"

          JAVA_VERSION=$(sed -n 's:.*<java.version>\(.*\)</java.version>.*:\1:p' "$APP_PATH/pom.xml" | head -1)

          if [ -z "$JAVA_VERSION" ]; then
            JAVA_VERSION=17
          fi

          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_ENV

      #######################################################################
      # LOAD AGENTS
      #######################################################################

      - name: Load Agents
        run: |

          echo "===== DOCKER AGENT ====="
          cat .github/agents/docker-agent.agent.md

          echo ""
          echo "===== TERRAFORM AGENT ====="
          cat .github/agents/terraform-agent.agent.md

          echo ""
          echo "===== CICD AGENT ====="
          cat .github/agents/cicd-agent.agent.md

      #######################################################################
      # DECISION ENGINE
      #######################################################################

      - name: Agent Decision Engine
        run: |

          echo "DOCKER_TEMPLATE=platform-templates/docker/java" >> $GITHUB_ENV

          echo "TERRAFORM_TEMPLATE=platform-templates/terraform/gcp-cloudrun" >> $GITHUB_ENV

          echo "CICD_TEMPLATE=platform-templates/github-actions/java-maven-cloudrun" >> $GITHUB_ENV

      #######################################################################
      # GENERATE ASSETS
      #######################################################################

      - name: Generate Docker Assets
        run: |

          if [ ! -f "$APP_PATH/Dockerfile" ]; then

            cp "$DOCKER_TEMPLATE/Dockerfile" \
              "$APP_PATH/Dockerfile"

            cp "$DOCKER_TEMPLATE/.dockerignore" \
              "$APP_PATH/.dockerignore"

          fi

      - name: Generate Terraform Assets
        run: |

          if [ ! -d "$APP_PATH/terraform" ]; then

            mkdir -p "$APP_PATH/terraform"

            cp -R \
              "$TERRAFORM_TEMPLATE/"* \
              "$APP_PATH/terraform/"

          fi

      - name: Generate CI/CD Assets
        run: |

          if [ ! -d "$APP_PATH/.github/workflows" ]; then

            mkdir -p "$APP_PATH/.github/workflows"

            cp \
              "$CICD_TEMPLATE/ci-cd.yml" \
              "$APP_PATH/.github/workflows/ci-cd.yml"

            cp \
              platform-templates/security/trivy/trivy.yml \
              "$APP_PATH/.github/workflows/trivy.yml"

            cp \
              platform-templates/security/gitleaks/gitleaks.yml \
              "$APP_PATH/.github/workflows/gitleaks.yml"

          fi

      #######################################################################
      # CREATE BRANCH
      #######################################################################

      - name: Configure Git
        run: |

          git config user.name "platform-agent"
          git config user.email "platform-agent@users.noreply.github.com"

      - name: Create Branch
        run: |

          BRANCH_NAME=platform-agent-${{ github.run_number }}

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          git checkout -b "$BRANCH_NAME"

      #######################################################################
      # COMMIT CHANGES
      #######################################################################

      - name: Commit Changes
        run: |

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Platform Agent generated DevOps assets"

      #######################################################################
      # PUSH BRANCH
      #######################################################################

      - name: Push Branch
        run: |

          git push origin "$BRANCH_NAME"

      #######################################################################
      # CREATE PR
      #######################################################################

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Platform Agent Generated DevOps Assets" \
            --body "
          ## Platform Agent

          Generated:

          - Dockerfile
          - Terraform
          - CI/CD Workflow
          - Trivy
          - Gitleaks
          "

      #######################################################################
      # REVIEW
      #######################################################################

      - name: Platform Review
        run: |

          cat << EOF >> $GITHUB_STEP_SUMMARY

          # Platform Agent Review

          ## Application

          Path:
          - $APP_PATH

          Java Version:
          - $JAVA_VERSION

          ## Templates Used

          - $DOCKER_TEMPLATE
          - $TERRAFORM_TEMPLATE
          - $CICD_TEMPLATE

          ## Generated

          - Dockerfile
          - Terraform
          - CI/CD Workflow
          - Trivy
          - Gitleaks

          EOF